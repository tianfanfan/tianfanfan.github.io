<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>ELS</title>
    <style type="text/css">
      .canvas {
        text-align: center;
        font-size: 0;
      }
      canvas {
        /* min-width: 40px; */
      }
      body,
      html {
        margin: 0;
      }
      body {
        margin-top: 140px;
      }
      .chess-section {
        position: relative;
        display: inline-block;
      }
      .onepiece-section {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }
      .onepiece-canvas {
        position: absolute;
        left: 0;
        top: 0;
        /* 定位设置位置，变换设置旋转 */
        transition: all linear .3s;
      }
    </style>
  </head>
  <body>
    <div class="canvas">
      <section class="chess-section">
        <canvas id="chess"></canvas>
        <section class="onepiece-section">
          <canvas id="onepiece" class="onepiece-canvas"></canvas>
        </section>
      </section>
    </div>
  </body>
  <script src="../utils/lodash.min.js" defer></script>
  <script defer src="./tf-tetris.js"></script>
</html>
